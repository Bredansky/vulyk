name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Print publish diagnostics
        run: |
          node -v
          npm -v
          echo "registry=$(npm config get registry)"
          echo "oidc_request_url_present=${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "oidc_request_token_present=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --if-present

      - name: Run tests
        run: npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
        run: npm publish

  # ----------------------------------------------------------------------------
  # Create a GitHub Release for the same tag so the sidebar's "Latest release"
  # pointer stays current. Depends on the publish job succeeding.
  #
  # Why a separate job (not a step): `gh release create` needs `contents: write`
  # on GITHUB_TOKEN, but the publish job must keep `id-token: write` for npm
  # trusted publishing. Splitting them lets each job declare only the
  # permissions it needs (least privilege).
  # ----------------------------------------------------------------------------
  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create releases via gh CLI
    steps:
      - name: Create GitHub release for ${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes
