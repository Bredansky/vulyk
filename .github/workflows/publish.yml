name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Print publish diagnostics
        run: |
          node -v
          npm -v
          echo "registry=$(npm config get registry)"
          echo "oidc_request_url_present=${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "oidc_request_token_present=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --if-present

      - name: Run tests
        run: npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
        run: npm publish
